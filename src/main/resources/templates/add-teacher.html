<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавить преподавателя</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f5f5f5;
        }
        h1 {
            color: #2c3e50;
            text-align: center;
        }
        .form-container {
            background: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #2c3e50;
            font-weight: bold;
        }
        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background: #3498db;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }
        button:hover {
            background: #2980b9;
        }
        .cancel {
            background: #95a5a6;
            text-decoration: none;
            color: white;
            padding: 12px 30px;
            border-radius: 5px;
            display: inline-block;
        }
        .cancel:hover {
            background: #7f8c8d;
        }
        
        /* Стили для выпадающего списка */
        .suggestions-box {
            border: 1px solid #ddd;
            max-height: 200px;
            overflow-y: auto;
            position: absolute;
            background: white;
            width: 100%;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            z-index: 1000;
            display: none;
            border-radius: 4px;
            margin-top: 2px;
        }
        .suggestion-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }
        .suggestion-item:hover {
            background-color: #f0f0f0;
        }
        
        /* Стиль для картинки-шутки */
        #jokeImage {
            position: absolute;
            left: -240px;
            top: 50%;
            transform: translateY(-50%);
            width: 200px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <h1> Добавить преподавателя</h1>
    
    <div class="form-container">
        <form action="/add-teacher" method="post">
            <div class="form-group">
                <label>Выберите факультет:</label>
                <select name="facultyIndex" required>
                    <option value="">-- Выберите факультет --</option>
                    <option th:each="faculty, iter : ${faculties}" 
                            th:value="${iter.index + 1}" 
                            th:text="${faculty.названиеФакультета}">
                        Название факультета
                    </option>
                </select>
            </div>
            
            <div class="form-group">
                <label>ФИО преподавателя:</label>
                <input type="text" name="фио" id="teacherNameInput" placeholder="Начните вводить ФИО" autocomplete="off" required>
                <div id="teacherSuggestions" class="suggestions-box"></div>
                <!-- Картинка-шутка (изначально скрыта) -->
                <img id="jokeImage" src="/images/9b325399d4df615960e73ea9d90d29ac.jpg" style="display: none;">
            </div>
            
            <div class="form-group">
                <label>Кафедра:</label>
                <input type="text" name="кафедра" required>
            </div>
            
            <div class="form-group">
                <label>Должность:</label>
                <input type="text" name="должность" required>
            </div>
            
            <div class="form-group">
                <label>Стаж (лет):</label>
                <input type="number" name="стаж" required>
            </div>
            
            <div class="form-group">
                <label>Читаемые дисциплины:</label>
                <input type="text" name="дисциплины" placeholder="Например: Java, Python, SQL" required>
            </div>
            
            <button type="submit">Добавить преподавателя</button>
            <a href="/" class="cancel">Отмена</a>
        </form>
    </div>

    <script>
        const input = document.getElementById('teacherNameInput');
        const suggestionsBox = document.getElementById('teacherSuggestions');
        const jokeImage = document.getElementById('jokeImage');

        input.addEventListener('input', function() {
            const query = this.value.trim();

            if (query.length === 0) {
                suggestionsBox.style.display = 'none';
                jokeImage.style.display = 'none';
                return;
            }

            fetch('/test-search?query=' + encodeURIComponent(query))
                .then(response => response.json())
                .then(teachers => {
                    console.log('Найдено преподавателей:', teachers);
                    suggestionsBox.innerHTML = '';
                    
                   if (teachers.length === 0) {
    suggestionsBox.style.display = 'none';
    jokeImage.style.display = 'block';
    // убираем setTimeout — картинка не исчезнет сама
    return;
}
                    
                    // ЕСЛИ ПРЕПОДАВАТЕЛИ НАЙДЕНЫ — СКРЫВАЕМ КАРТИНКУ
                    jokeImage.style.display = 'none';

                    teachers.forEach(teacher => {
                        const div = document.createElement('div');
                        div.classList.add('suggestion-item');
                        div.textContent = teacher.фио + ' (' + teacher.кафедра + ')';
                        
                        div.addEventListener('click', function() {
                            input.value = teacher.фио;
                            suggestionsBox.style.display = 'none';
                            jokeImage.style.display = 'none';
                        });
                        
                        suggestionsBox.appendChild(div);
                    });
                    
                    suggestionsBox.style.display = 'block';
                });
        });

        document.addEventListener('click', function(event) {
            if (!input.contains(event.target) && !suggestionsBox.contains(event.target)) {
                suggestionsBox.style.display = 'none';
                jokeImage.style.display = 'none';
            }
        });
    </script>
</body>
</html>
