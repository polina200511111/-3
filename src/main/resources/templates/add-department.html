<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавить кафедру</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #fcffff;
        }
        h1 {
            color: #4e4b4b;
            text-align: center;
        }
        .form-container {
            background: white;
            max-width: 500px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #2c3e50;
            font-weight: bold;
        }
        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            background: #3498db;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-right: 10px;
        }
        button:hover {
            background: #2980b9;
        }
        .cancel {
            background: #95a5a6;
            text-decoration: none;
            color: white;
            padding: 12px 30px;
            border-radius: 5px;
            display: inline-block;
        }
        .cancel:hover {
            background: #7f8c8d;
        }
    </style>
</head>
<body>
    <h1> Добавить кафедру на факультет</h1>
    
    <div class="form-container">
        <form action="/add-department" method="post">
            <div class="form-group">
                <label>Выберите факультет:</label>
                <select name="facultyIndex" required>
                    <option value="">-- Выберите факультет --</option>
                    <option th:each="faculty, iter : ${faculties}" 
                            th:value="${iter.index + 1}" 
                            th:text="${faculty.названиеФакультета}">
                        Название факультета
                    </option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Название кафедры:</label>
                <input type="text" name="название" required>
            </div>
            
            <div class="form-group">
                <label>Направление подготовки:</label>
                <input type="text" name="направление" required>
            </div>
            
            <button type="submit">Добавить кафедру</button>
            <a href="/" class="cancel">Отмена</a>
        </form>
    </div>
</body>
</html>
